{% if site.data.settings.valueprops.enable == true %}
<!-- begin value props -->
<section class="section valueprops">
  <div class="container">
    <div class="row">
      {% for item in site.data.settings.valueprop__items %}
      <div class="col col-4 col-t-12">
        <div class="valueprops__item">
          <h3 class="valueprops__title">{{ item.title }}</h3>
          <p class="valueprops__description">{{ item.description }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
<!-- end value props -->
{% endif %}
