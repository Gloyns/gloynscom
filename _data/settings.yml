# Value Props Settings
valueprops:
  enable: true

valueprop__items:
  - title: "Built around the user. Not the algorithm."
    description: "Search engines and AI systems are both trying to serve users. It's always been that simple and it's why my approach always works regardless of how search evolves over time."

  - title: "Trusted by the industry to set the standard."
    description: "A judge at the <a href='https://www.globalsearchawards.net/' target='_blank'>Global Search Awards</a> and <a href='https://www.apacsearchawards.com/' target='_blank'>APAC Search Awards</a> — one of a small number of practitioners recognised at the highest level of the industry."

  - title: "Relationships built on results."
    description: "My average client tenure is seven years. I think that comes down to doing honest work, getting real results, and treating the relationship as seriously as the brief."

#-------------------------------
# Services Settings
services:
  enable: true
  services__label: How I work with you
  services__title: "The right kind of support, at the right level."
  services__footnote: "Also available: <a href='/consulting/adhoc/'>adhoc consulting</a> (hourly) · <a href='/consulting/expert-witness/'>SEO expert witness</a>"

service__items:
  - badge: "Retainer"
    badge_style: "retainer"
    title: "AI Search Visibility"
    url: "/consulting/ai-search-visibility/"
    description: "Helping your brand show up in ChatGPT, Google AI Mode, Google AI Overviews, and every AI surface, built on the same user-first principles as great SEO."

  - badge: "Retainer"
    badge_style: "retainer"
    title: "Embedded Search Partner"
    url: "/consulting/embedded-search-partner/"
    description: "I sit inside your team, either onsite or remote, owning search strategy across SEO, AEO, content, and measurement. From strategic Roadmap,to execution, and all the conversations in between."

  - badge: "Project"
    badge_style: "project"
    title: "Search Strategy"
    url: "/consulting/seo-strategy/"
    description: "A defined engagement mapping your landscape and handing you a prioritised roadmap across both traditional and AI search."

  - badge: "Project"
    badge_style: "project"
    title: "Site Migration"
    url: "/consulting/site-migration/"
    description: "Hundreds of migrations over 15+ years. Minimise risk, maximise opportunity, and support through launch and beyond."

  - badge: "Project"
    badge_style: "project"
    title: "Traffic Recovery"
    url: "/consulting/traffic-recovery/"
    description: "If you've taken an unexpected hit — algorithmic, technical, or otherwise — I find the cause and build the path back."

  - badge: "Agency"
    badge_style: "dark"
    title: "Creative Agency Partner"
    url: "/consulting/agency-partner/"
    description: "The senior search expert your agency brings in for clients who need that depth. White-label or named - whatever works."

#-------------------------------
# Process Settings
process:
  enable: true
  process__label: How I work with clients
  process__title: "Every engagement starts the same way."
  process__intro: "Before I make a single recommendation, I need to understand your business — your users, your team, your history, and your constraints. That understanding is what separates a generic roadmap from one your team can actually execute."

process__items:
  - number: "01"
    title: "Discovery"
    description: "I get to know your business properly — your tech stack, your customer, what you've tried, what's worked, and what hasn't."

  - number: "02"
    title: "Competitive analysis"
    description: "I map the landscape across traditional and AI search to understand where the opportunity exists and where your brand has the right to win."

  - number: "03"
    title: "Roadmap"
    description: "A clear, prioritised plan — ordered by impact and feasibility, mapped to your team's actual capacity."

  - number: "04"
    title: "Working with your team"
    description: "I work directly with your marketers, developers, and product managers. I dont just hand over a long document and wish you luck."

  - number: "05"
    title: "Technical architecture"
    description: "I get the foundations right — crawlability, structure, schema, performance — so search engines and AI systems can find and understand what you do."

  - number: "06"
    title: "Iteration and improvement"
    description: "Search isn't a project with an end date. I measure, learn, and adapt — constantly finding new opportunities and improving on what's working."

